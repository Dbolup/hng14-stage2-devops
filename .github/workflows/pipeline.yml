name: CI/CD Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────
  # STAGE 1: LINT
  # ─────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Python linter
        run: pip install flake8

      - name: Lint Python API
        run: flake8 api/main.py --max-line-length=100

      - name: Lint Python Worker
        run: flake8 worker/worker.py --max-line-length=100

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Lint JavaScript
        run: |
          cd frontend && npx eslint app.js \
            --no-eslintrc \
            --rule '{"no-undef":"warn","no-unused-vars":"warn"}' || true

      - name: Install Hadolint
        run: |
          wget -qO /usr/local/bin/hadolint \
            https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
          chmod +x /usr/local/bin/hadolint

      - name: Lint Dockerfiles
        run: |
          hadolint api/Dockerfile
          hadolint worker/Dockerfile
          hadolint frontend/Dockerfile

  # ─────────────────────────────────────────
  # STAGE 2: TEST
  # ─────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: pip install fastapi redis uvicorn pytest pytest-cov httpx

      - name: Create test directory
        run: mkdir -p api/tests && touch api/tests/__init__.py

      - name: Write test file
        run: |
          cat > api/tests/test_main.py << 'PYEOF'
          import pytest
          from unittest.mock import MagicMock, patch
          from fastapi.testclient import TestClient
          import sys
          import os

          sys.path.insert(0, os.path.join(os.path.dirname(__file__), '..'))

          mock_redis = MagicMock()

          with patch('redis.Redis', return_value=mock_redis):
              from main import app

          client = TestClient(app)


          def test_health_check():
              response = client.get("/health")
              assert response.status_code == 200
              assert response.json() == {"status": "ok"}


          def test_create_job():
              mock_redis.lpush.return_value = 1
              mock_redis.hset.return_value = 1
              response = client.post("/jobs")
              assert response.status_code == 200
              assert "job_id" in response.json()


          def test_get_job_not_found():
              mock_redis.hget.return_value = None
              response = client.get("/jobs/nonexistent-id")
              assert response.status_code == 200
              assert response.json() == {"error": "not found"}


          def test_get_job_found():
              mock_redis.hget.return_value = b"queued"
              response = client.get("/jobs/some-valid-id")
              assert response.status_code == 200
              assert response.json()["status"] == "queued"


          def test_create_job_pushes_to_queue():
              mock_redis.reset_mock()
              mock_redis.lpush.return_value = 1
              mock_redis.hset.return_value = 1
              client.post("/jobs")
              mock_redis.lpush.assert_called_once()
          PYEOF

      - name: Run tests with coverage
        run: cd api && pytest tests/ -v --cov=. --cov-report=xml --cov-report=term

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage.xml

  # ─────────────────────────────────────────
  # STAGE 3: BUILD
  # ─────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: [test]
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: |
            localhost:5000/api:${{ github.sha }}
            localhost:5000/api:latest

      - name: Build and push Worker image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            localhost:5000/worker:${{ github.sha }}
            localhost:5000/worker:latest

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            localhost:5000/frontend:${{ github.sha }}
            localhost:5000/frontend:latest

  # ─────────────────────────────────────────
  # STAGE 4: SECURITY SCAN
  # ─────────────────────────────────────────
  security-scan:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build images locally for scanning
        run: |
          docker build -t scan/api:latest ./api
          docker build -t scan/worker:latest ./worker
          docker build -t scan/frontend:latest ./frontend

      - name: Install Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key \
            | gpg --dearmor \
            | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] \
            https://aquasecurity.github.io/trivy-repo/deb generic main" \
            | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update && sudo apt-get install -y trivy

      - name: Scan API image
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --format sarif \
            --output trivy-api.sarif \
            scan/api:latest || true

      - name: Scan Worker image
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --format sarif \
            --output trivy-worker.sarif \
            scan/worker:latest || true

      - name: Scan Frontend image
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --format sarif \
            --output trivy-frontend.sarif \
            scan/frontend:latest || true

      - name: Upload Trivy SARIF results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-sarif-results
          path: "*.sarif"

  # ─────────────────────────────────────────
  # STAGE 5: INTEGRATION TEST
  # ─────────────────────────────────────────
  integration-test:
    runs-on: ubuntu-latest
    needs: [security-scan]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          echo "REDIS_HOST=redis" >> .env
          echo "REDIS_PORT=6379" >> .env
          echo "API_URL=http://api:8000" >> .env
          echo "FRONTEND_PORT=3000" >> .env

      - name: Build and start full stack
        run: |
          docker compose up --build -d
          echo "Waiting for services to be healthy..."
          sleep 30

      - name: Check containers are running
        run: docker compose ps

      - name: Submit job and poll until complete
        run: |
          echo "Submitting job..."
          RESPONSE=$(curl -s -X POST http://localhost:3000/submit)
          echo "Response: $RESPONSE"
          JOB_ID=$(echo $RESPONSE | python3 -c \
            "import sys,json; print(json.load(sys.stdin)['job_id'])")
          echo "Job ID: $JOB_ID"
          for i in $(seq 1 20); do
            STATUS=$(curl -s http://localhost:3000/status/$JOB_ID | python3 -c \
              "import sys,json; print(json.load(sys.stdin).get('status','unknown'))")
            echo "Attempt $i: status = $STATUS"
            if [ "$STATUS" = "completed" ]; then
              echo "Job completed successfully!"
              exit 0
            fi
            sleep 3
          done
          echo "Job did not complete in time!"
          exit 1

      - name: Tear down stack
        if: always()
        run: docker compose down -v

  # ─────────────────────────────────────────
  # STAGE 6: DEPLOY (main branch only)
  # ─────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: [integration-test]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          echo "REDIS_HOST=redis" >> .env
          echo "REDIS_PORT=6379" >> .env
          echo "API_URL=http://api:8000" >> .env
          echo "FRONTEND_PORT=3000" >> .env

      - name: Start stack
        run: docker compose up --build -d && sleep 20

      - name: Rolling update API
        run: |
          docker compose up -d --build --no-deps api
          for i in $(seq 1 12); do
            STATUS=$(docker inspect \
              --format='{{.State.Health.Status}}' \
              $(docker compose ps -q api) 2>/dev/null || echo "none")
            echo "Attempt $i: $STATUS"
            if [ "$STATUS" = "healthy" ]; then
              echo "API healthy - update complete"
              exit 0
            fi
            sleep 5
          done
          echo "API failed health check - aborting"
          exit 1

      - name: Rolling update Worker
        run: docker compose up -d --build --no-deps worker

      - name: Rolling update Frontend
        run: |
          docker compose up -d --build --no-deps frontend
          for i in $(seq 1 12); do
            STATUS=$(docker inspect \
              --format='{{.State.Health.Status}}' \
              $(docker compose ps -q frontend) 2>/dev/null || echo "none")
            echo "Attempt $i: $STATUS"
            if [ "$STATUS" = "healthy" ]; then
              echo "Frontend healthy - update complete"
              exit 0
            fi
            sleep 5
          done
          echo "Frontend failed health check - aborting"
          exit 1

      - name: Deployment complete
        run: docker compose ps
